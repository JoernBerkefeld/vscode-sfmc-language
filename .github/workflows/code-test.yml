name: Code Testing

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - run: npm ci --no-workspaces
            - run: npm run lint
            - run: npm run compile
            - name: Install Xvfb for headless VS Code test runner
              run: sudo apt-get install -y xvfb
            - name: Run tests (headless)
              run: xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" npm test
